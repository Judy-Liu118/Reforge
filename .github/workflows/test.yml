name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + test extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run pytest
        env:
          # LLMClient passes config.llm_api_key explicitly to OpenAI(); on CI
          # without a .env file that value is "" which the OpenAI SDK rejects
          # at construction time (won't fall back to env vars when an empty
          # string is passed). Set LLM_API_KEY alongside OPENAI_API_KEY so
          # both code paths get a dummy value sufficient for non-network
          # construction in tests that build a real LLMClient.
          LLM_API_KEY: "dummy-for-unit-tests"
          OPENAI_API_KEY: "dummy-for-unit-tests"
          REFORGE_DISABLE_LLM: "1"
        run: |
          pytest reforge/tests -q

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run ruff
        run: |
          ruff check reforge --output-format=github || true
